<svg width="100%" viewBox="0 0 680 190" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes fadeUp  { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:translateY(0)} }
      @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
      @keyframes blink   { 0%,100%{opacity:1} 50%{opacity:0} }
      @keyframes flowUp  { 0%{stroke-dashoffset:24} 100%{stroke-dashoffset:0} }
      @keyframes pulse   { 0%,100%{opacity:0.3} 50%{opacity:0.9} }
      @keyframes dmzGlow { 0%,100%{opacity:0.10} 50%{opacity:0.28} }
      .t1{animation:fadeUp .5s .2s ease both}
      .t2{animation:fadeUp .6s .5s ease both}
      .t3{animation:fadeUp .5s .9s ease both}
      .diagram{animation:fadeIn 1.1s .4s ease both;opacity:0}
      .flow{stroke-dasharray:4 3;animation:flowUp 2s linear infinite}
      .dp{animation:pulse 2.2s ease-in-out infinite}
      .dmz-fill{animation:dmzGlow 3.2s ease-in-out infinite}
      .cur{animation:blink 1s step-end infinite}
    </style>
  </defs>

  <rect width="680" height="190" fill="#0d1117"/>

  <line x1="0" y1="47"  x2="680" y2="47"  stroke="#ffffff03" stroke-width="1"/>
  <line x1="0" y1="95"  x2="680" y2="95"  stroke="#ffffff03" stroke-width="1"/>
  <line x1="0" y1="143" x2="680" y2="143" stroke="#ffffff03" stroke-width="1"/>

  <rect x="0" y="0" width="3" height="190" fill="#58a6ff"/>

  <line x1="20" y1="16"  x2="660" y2="16"  stroke="#1a2030" stroke-width="0.7"/>
  <line x1="20" y1="174" x2="660" y2="174" stroke="#1a2030" stroke-width="0.7"/>

  <g class="diagram">

    <rect x="372" y="143" width="266" height="20" rx="3" fill="#091509" stroke="#3fb950" stroke-width="0.8"/>
    <text x="380" y="154" font-family="'Courier New',monospace" font-size="7" fill="#1e4020" dominant-baseline="middle">0</text>
    <text x="393" y="154" font-family="'Courier New',monospace" font-size="8" fill="#2d6030" dominant-baseline="middle">Physical Process</text>

    <rect x="376" y="119" width="258" height="22" rx="3" fill="#091509" stroke="#3fb950" stroke-width="0.8"/>
    <text x="384" y="130" font-family="'Courier New',monospace" font-size="7" fill="#1e4020" dominant-baseline="middle">1</text>
    <text x="397" y="130" font-family="'Courier New',monospace" font-size="8" fill="#2d6030" dominant-baseline="middle">Process Control</text>

    <rect x="380" y="95" width="250" height="22" rx="3" fill="#090d18" stroke="#58a6ff" stroke-width="0.8"/>
    <text x="388" y="106" font-family="'Courier New',monospace" font-size="7" fill="#1a3050" dominant-baseline="middle">2</text>
    <text x="401" y="106" font-family="'Courier New',monospace" font-size="8" fill="#1e4a70" dominant-baseline="middle">Supervision and Control</text>

    <rect x="384" y="71" width="242" height="22" rx="3" fill="#0f0d05" stroke="#e3b341" stroke-width="0.8"/>
    <text x="392" y="82" font-family="'Courier New',monospace" font-size="7" fill="#3a2e08" dominant-baseline="middle">3</text>
    <text x="405" y="82" font-family="'Courier New',monospace" font-size="8" fill="#5a4a18" dominant-baseline="middle">Site Operations</text>

    <rect class="dmz-fill" x="388" y="57" width="234" height="12" rx="2" fill="#200505"/>
    <line x1="388" y1="57" x2="622" y2="57" stroke="#f85149" stroke-width="0.7" stroke-dasharray="5 3"/>
    <line x1="388" y1="69" x2="622" y2="69" stroke="#f85149" stroke-width="0.7" stroke-dasharray="5 3"/>
    <text x="505" y="64" font-family="'Courier New',monospace" font-size="7.5" fill="#c0392b" text-anchor="middle" dominant-baseline="middle" letter-spacing="3">DMZ</text>

    <rect x="392" y="37" width="226" height="18" rx="3" fill="#0d1117" stroke="#30363d" stroke-width="0.7"/>
    <text x="400" y="46" font-family="'Courier New',monospace" font-size="7" fill="#30363d" dominant-baseline="middle">4</text>
    <text x="413" y="46" font-family="'Courier New',monospace" font-size="8" fill="#383e47" dominant-baseline="middle">Enterprise</text>

    <line class="flow" x1="390" y1="119" x2="390" y2="141" stroke="#3fb950" stroke-width="0.8" opacity="0.5"/>
    <line class="flow" x1="394" y1="95"  x2="394" y2="117" stroke="#3fb950" stroke-width="0.8" opacity="0.4"/>
    <line class="flow" x1="398" y1="71"  x2="398" y2="93"  stroke="#58a6ff" stroke-width="0.8" opacity="0.4"/>
    <line class="flow" x1="402" y1="37"  x2="402" y2="55"  stroke="#e3b341" stroke-width="0.8" opacity="0.3"/>

    <circle class="dp" cx="390" cy="131" r="2" fill="#3fb950"/>
    <circle class="dp" cx="394" cy="106" r="2" fill="#3fb950" style="animation-delay:.55s"/>
    <circle class="dp" cx="398" cy="82"  r="2" fill="#58a6ff" style="animation-delay:1.1s"/>
    <circle class="dp" cx="402" cy="46"  r="2" fill="#e3b341" style="animation-delay:1.65s"/>

    <line x1="634" y1="37"  x2="634" y2="163" stroke="#1a2030" stroke-width="0.8"/>
    <line x1="630" y1="37"  x2="634" y2="37"  stroke="#1a2030" stroke-width="0.8"/>
    <line x1="630" y1="163" x2="634" y2="163" stroke="#1a2030" stroke-width="0.8"/>
    <text x="646" y="103" font-family="'Courier New',monospace" font-size="6.5" fill="#1a2030" text-anchor="middle" transform="rotate(90,646,103)">PURDUE MODEL</text>

  </g>

  <text class="t1" x="18"  y="104" font-family="'Courier New',monospace" font-size="44" font-weight="bold" fill="#e6edf3" letter-spacing="1">BRYKZEN</text>
  <text class="t2" x="21"  y="128" font-family="'Courier New',monospace" font-size="11" fill="#58a6ff" letter-spacing="0.5">Industrial Safety &amp; Security Engineering<text class="cur" fill="#58a6ff">_</text></text>
  <text class="t3" x="21"  y="158" font-family="'Courier New',monospace" font-size="8"  fill="#21262d">OT / ICS · Industry 4.0 &amp; 5.0</text>

</svg>
